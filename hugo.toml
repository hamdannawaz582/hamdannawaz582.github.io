baseURL = 'https://hamdannawaz582.github.io/'
locale = 'en-us'
title = "Hamdan's Dev Slog"
baseurl = "/"
pagination.pagerSize = 5

[markup.highlight]
    noClasses = false

[params]
    author = "Hamdan Nawaz"

    contentTypeName = "posts"

    centerTheme = true
    menuMore = "Show more"
    readMore = "Read more"
    [params.logo]
        logoText = "Hamdan's Dev Slog"

[menu]
    [[menu.main]]
        name = "Home"
        url = "/"
        weight = 1
    
    [[menu.main]]
        name = "About"
        url = "/about"
        weight = 2
    
    [[menu.main]]
        name = "Tags"
        url = "/tags/"
        weight = 3

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[module]
  # this is needed when you fetch the theme as a submodule to your repo.
  # replacements = "github.com/panr/hugo-theme-terminal/4 -> themes/terminal"
[[module.imports]]
  path = 'github.com/panr/hugo-theme-terminal/v4'